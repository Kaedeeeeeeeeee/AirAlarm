<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A2E"/>
      <stop offset="100%" stop-color="#1A0A3E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.47" r="0.35">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <rect width="1024" height="1024" rx="224" fill="url(#glow)"/>

  <!-- Clock circle -->
  <circle cx="512" cy="520" r="280" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="32"/>

  <!-- Wake window arc -->
  <path d="M 512 240 A 280 280 0 0 1 730 400" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="32" stroke-linecap="round"/>

  <!-- Moon crescent -->
  <circle cx="460" cy="440" r="110" fill="#FFFFFF" fill-opacity="0.85"/>
  <circle cx="510" cy="400" r="90" fill="#0E0B28"/>

  <!-- Stars -->
  <circle cx="600" cy="340" r="8" fill="#FFFFFF" fill-opacity="0.7"/>
  <circle cx="640" cy="400" r="5" fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="570" cy="300" r="4" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="660" cy="340" r="3" fill="#FFFFFF" fill-opacity="0.3"/>
</svg>
